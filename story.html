<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>剧情主题 - 山城行·智能旅</title>
    <style>
        :root {
            --paper: #F0E8D8;
            --paper-light: #F5EDE0;
            --paper-dark: #E0D4C0;
            --ink: #4A1010;
            --ink-light: #6B3020;
            --gold: #B87030;
            --gold-light: #D4A070;
            --wood: #C0B098;
            --wood-dark: #A89880;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Serif SC', 'STSong', 'Songti SC', serif;
            background-image: url('static/images/背景图2.jpg');
            background-size: cover;
            background-position: center;
            width: 100vw; height: 100vh; overflow: hidden;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        #paper-texture {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            pointer-events: none; mix-blend-mode: multiply; opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg width='400' height='400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/%3E%3C/svg%3E");
            background-repeat: repeat;
        }

        #main-content {
            position: relative; z-index: 2; max-width: 1300px; margin: 0 auto;
            padding: 2vh 60px 2vh; height: 100vh;
            display: flex; flex-direction: column;
        }

        #station-board {
            width: 60vw; max-width: 600px; margin: 0 auto 2vh; flex-shrink: 0;
            background: #E8DDD0; border: 3px solid var(--wood-dark);
            border-radius: 8px; padding: 8px 0; text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12), inset 0 0 20px rgba(0,0,0,0.05);
        }
        #station-board .signal-light {
            display: inline-block; width: 10px; height: 10px; border-radius: 50%;
            background: #D84030; margin: 0 8px; vertical-align: middle;
            box-shadow: 0 0 8px #D84030;
            animation: signalBlink 0.8s ease-in-out infinite;
        }
        .signal-light:nth-child(1) { animation-delay: 0s; }
        .signal-light:nth-child(2) { animation-delay: 0.4s; }
        @keyframes signalBlink { 0%,100%{opacity:1;} 50%{opacity:0.25;} }
        #station-text {
            font-family: 'Noto Serif SC', 'STSong', serif;
            font-size: clamp(16px, 2.2vw, 24px); font-weight: 700;
            color: var(--ink); letter-spacing: 0.2em;
        }

        #cards-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 14px; flex: 1;
            align-content: stretch; padding: 1vh 0;
        }

        .story-btn {
            display: flex; align-items: center; gap: 10px;
            background: rgba(245,237,224,0.73); cursor: pointer;
            transition: all 0.3s ease; text-decoration: none; color: inherit;
            box-shadow: 0 2px 8px rgba(80,50,30,0.15);
            border: none; border-radius: 6px;
            padding: 4px 20px; position: relative;
        }
        .story-btn::before {
            content: ''; position: absolute; left: -10px; top: 50%; transform: translateY(-50%);
            width: 20px; height: 20px; background: #C4B098; border-radius: 50%;
            box-shadow: inset 0 0 0 3px rgba(180,150,120,0.6);
        }
        .story-btn::after {
            content: ''; position: absolute; right: -2px; top: 0; width: 8px; height: 100%;
            background: rgba(245,237,224,0.73); border-radius: 0 4px 4px 0;
            mask-image: repeating-linear-gradient(0deg, transparent 0px, transparent 8px, black 8px, black 10px);
            -webkit-mask-image: repeating-linear-gradient(0deg, transparent 0px, transparent 8px, black 8px, black 10px);
        }
        .story-btn .stamp {
            position: absolute; right: 35px; top: 50%; transform: translateY(-50%) rotate(-12deg);
            font-family: 'LiSu','隶书','KaiTi',serif; font-size: 13px; color: rgba(180,60,40,0.35);
            border: 2px solid rgba(180,60,40,0.3); border-radius: 4px;
            padding: 1px 6px; letter-spacing: 0.15em; pointer-events: none;
        }
        .story-btn:hover {
            transform: translateX(4px);
            box-shadow: 0 6px 20px rgba(80,50,30,0.25);
            background: #FBF5EE;
        }

        .btn-icon {
            flex-shrink: 0; width: 40px; height: 40px;
            background: #EDE0D0; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-icon svg { width: 28px; height: 28px; }
        .btn-info { flex: 1; min-width: 0; }
        .btn-title {
            font-family: 'Noto Serif SC', 'STSong', serif;
            font-weight: 700; color: #3D1810; font-size: 14px;
            margin-bottom: 2px; letter-spacing: 0.03em;
        }
        .btn-pois {
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            font-size: 10px; color: #8B6A50; display: flex; flex-wrap: wrap; gap: 3px;
        }
        .btn-pois span {
            background: rgba(140,100,70,0.12); color: #8B6A50; padding: 1px 6px; border-radius: 5px;
        }
        .btn-arrow { flex-shrink: 0; color: #A08068; font-size: 18px; }

        #detail-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; background: rgba(20,8,4,0.7);
            display: none; align-items: center; justify-content: center;
        }
        #detail-overlay.show { display: flex; }
        #detail-panel {
            width: 85vw; max-width: 600px; max-height: 90vh;
            aspect-ratio: 3/4;
            background: #F5EDE0; border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            position: relative;
            background-size: cover;
            background-position: center;
            background-attachment: scroll;
        }
        #detail-panel::before {
            content: '';
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(245,237,224,0.65);
            border-radius: 12px; pointer-events: none; z-index: 1;
        }
        #detail-panel::-webkit-scrollbar { width: 4px; }
        #detail-panel::-webkit-scrollbar-thumb { background: rgba(160,132,92,0.3); border-radius: 2px; }
        #detail-close {
            position: absolute; top: 14px; right: 18px;
            width: 32px; height: 32px; border-radius: 50%;
            background: rgba(0,0,0,0.1); border: none; cursor: pointer;
            font-size: 18px; color: #5C3A28; z-index: 20;
            display: flex; align-items: center; justify-content: center;
        }
        #detail-close:hover { background: rgba(0,0,0,0.2); }
        #detail-body { padding: 28px 28px 28px; position: relative; z-index: 2; overflow-y: auto; max-height: 100%; }
        #detail-theme-name {
            font-family: 'Noto Serif SC', 'STSong', serif;
            font-size: 22px; font-weight: 700; color: #3D1810;
            margin-bottom: 4px; letter-spacing: 0.04em;
        }
        #detail-theme-subtitle {
            font-family: 'LiSu', '隶书', 'STLiti', 'KaiTi', serif;
            font-size: 13px; color: #8B6A50; margin-bottom: 16px;
            letter-spacing: 0.06em;
        }
        #detail-story {
            font-family: 'Noto Serif SC', 'STSong', serif;
            font-size: 14px; color: #4A3F2F; line-height: 1.9;
            margin-bottom: 20px; text-align: justify;
        }
        #detail-pois-list { margin-bottom: 20px; }
        .detail-poi-item {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 8px 0; border-bottom: 1px dotted rgba(160,140,120,0.25);
            font-family: 'Noto Serif SC', 'STSong', serif; font-size: 13px; color: #3D1810;
        }
        .detail-poi-item:last-child { border-bottom: none; }
        .detail-poi-dot {
            flex-shrink: 0; width: 8px; height: 8px; border-radius: 50%;
            background: #8B3A3A; margin-top: 5px;
        }
        #detail-meta {
            display: flex; gap: 24px; flex-wrap: wrap;
            padding: 14px 18px; background: rgba(200,170,140,0.15);
            border-radius: 8px; margin-bottom: 20px;
        }
        .detail-meta-item {
            font-family: 'LiSu', '隶书', 'STLiti', 'KaiTi', serif;
            font-size: 13px; color: #5C3A28;
        }
        .detail-meta-item span { font-weight: 700; color: #3D1810; }
        #detail-start-btn {
            display: block; width: 100%; padding: 12px 0;
            background: #8B3A3A; color: #F5EDE0; border: none; border-radius: 8px;
            font-family: 'Noto Serif SC', 'STSong', serif;
            font-size: 16px; font-weight: 700; cursor: pointer;
            letter-spacing: 0.06em; transition: all 0.3s ease;
            text-align: center;
        }
        #detail-start-btn:hover { background: #6B2020; }

        #back-section { text-align: center; padding: 1vh 0 0; flex-shrink: 0; }
        #back-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer;
            font-family: 'LiSu', '隶书', 'STLiti', 'KaiTi', serif;
            font-size: 14px; color: #5C3A28; text-decoration: none; transition: all 0.3s;
            background: #F5EDE0; padding: 10px 28px; position: relative;
            border-radius: 4px;
            box-shadow: 0 2px 6px rgba(80,50,30,0.15);
            border-bottom: 2px dashed #B8A080;
        }
        #back-btn:hover { color: #3D1810; background: #FBF5EE; box-shadow: 0 4px 12px rgba(80,50,30,0.25); }

        @media (max-width: 768px) {
            #cards-grid { grid-template-columns: 1fr; gap: 10px; }
            .story-btn { padding: 10px 14px; }
            .btn-title { font-size: 13px; }
            .btn-icon { width: 36px; height: 36px; }
            .btn-icon svg { width: 24px; height: 24px; }
            #detail-body { padding: 20px 18px 22px; }
        }
    </style>
</head>
<body>

    <div style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;
                background:rgba(196,176,152,0.5);"></div>

    <div id="paper-texture"></div>

    <div id="main-content">
        <div id="station-board">
            <span class="signal-light"></span>
            <span class="signal-light"></span>
            <span id="station-text">每一段故事，都是一座山城</span>
            <span class="signal-light"></span>
            <span class="signal-light"></span>
        </div>

        <div id="cards-grid"></div>

        <div id="back-section">
            <a id="back-btn" href="index.html">← 返回首页</a>
        </div>
    </div>

    <div id="detail-overlay">
        <div id="detail-panel">
            <button id="detail-close" onclick="closeDetail()">✕</button>
            <div id="detail-body">
                <div id="detail-theme-name"></div>
                <div id="detail-theme-subtitle"></div>
                <div id="detail-story"></div>
                <div id="detail-meta"></div>
                <div id="detail-pois-list"></div>
                <button id="detail-start-btn" onclick="startNavigate()">开始导航</button>
            </div>
        </div>
    </div>

    <script>
        const themes = [
            { name: '时空档案：重返 1941 雾都暗战', subtitle: '雾锁山城藏暗流，一寸旧址一寸烽烟',
              pois: [
                { name: '周公馆（曾家岩50号）', desc: '南方局城内办公驻地，周恩来邓颖超在此工作，阁楼窗口曾送出无数密电' },
                { name: '重庆抗战遗址博物馆（黄山）', desc: '陪都军政遗存，蒋介石官邸所在，山林间藏着战时最高指挥中枢' },
                { name: '大轰炸六五隧道惨案遗址', desc: '1941年防空隧道，千余同胞遇难处，洞壁至今留存窒息挣扎的指痕' },
                { name: '抗建堂', desc: '抗战话剧核心阵地，郭沫若曹禺在此排演救国剧目，舞台下方曾有暗道传递情报' },
              ],
              story: '1941年的重庆，雾季是这座城市天然的防空洞。日军轰炸机在云层之上盘旋，而云层之下，另一场战争正在悄然进行——中共南方局在曾家岩50号的小楼里收发密电，抗建堂的舞台上话剧演员用台词传递暗号，防空隧道深处，普通市民在黑暗中攥紧彼此的手。这不是一个关于胜利的故事，而是一个关于"守住"的故事——守住一座城，守住一种信念，守住乱世里的一寸光亮。',
            },
            { name: '光影回响：寻找失落的银幕碎片', subtitle: '山城街巷皆片场，一步一景遇荧幕旧梦',
              pois: [
                { name: '鹅岭二厂文创公园', desc: '民国印钞厂旧址，《从你的全世界路过》天台取景地，城市天际线是主角' },
                { name: '魁星楼', desc: '《少年的你》经典取景地，65米高空连廊，新旧建筑同框的魔幻画面' },
                { name: '白象居', desc: '24层无电梯老居民楼，《少年的你》《隐秘的角落》取景，转角即镜头' },
                { name: '长江索道', desc: '"空中公交"，《疯狂的石头》等多部电影取景，轿厢里看尽两江四岸' },
              ],
              story: '重庆不需要搭景，因为整座城市就是一个天然的摄影棚。鹅岭二厂的天台上，城市的天际线是主角；魁星楼的悬空天桥上，少年的你从这里走过；白象居的24层无电梯楼道里，每一个转角都可能出现在下一部电影的镜头中。跨过长江索道，你穿过的不是江，而是一帧帧被定格的山城光影。',
            },
            { name: '不夜山城：寻找第九号重力逆转点', subtitle: '两江灯火颠倒楼宇，解锁山城魔幻天际',
              pois: [
                { name: '来福士水晶连廊', desc: '朝天门250米高空玻璃廊道，长江嘉陵江在脚下交汇，夜晚如悬浮的星际飞船' },
                { name: '李子坝轻轨观景台', desc: '轻轨横穿居民楼，全国独有立体交通奇观，列车从楼中穿出的一瞬最为震撼' },
                { name: '魁星楼悬空天桥', desc: '22层写字楼与半山广场齐平，站在桥上仿佛重力失效，脚下是65米纵深街谷' },
                { name: '洪崖洞民俗风貌区', desc: '11层吊脚楼灯火璀璨，顶层与底层皆通马路，现实版千与千寻的奇幻夜景' },
              ],
              story: '当夜幕降临，重庆的重力仿佛开始失效。来福士的水晶连廊悬浮在250米高空，李子坝的轻轨穿楼而过像是现实版的盗梦空间，魁星楼的悬空天桥让22层高楼与广场平齐，而洪崖洞的11层吊脚楼灯火璀璨，顶层和底层都通向马路。这不是物理学的奇迹，这是重庆独有的8D魔幻。',
            },
            { name: '山城烟火：寻味巴渝地道江湖味', subtitle: '巷陌藏人间百味，一锅红油煮尽山城温柔',
              pois: [
                { name: '八一路好吃街', desc: '解放碑核心美食街区，酸辣粉、山城小汤圆、卤味，山城小吃的大本营' },
                { name: '山城巷美食老街', desc: '百年步道上的风味街，开了几十年的豌杂面老店藏在石阶旁，红糖汤圆热气腾腾' },
                { name: '弹子石老街美食区', desc: '南岸滨江复古老街，老火锅、江湖菜、本土小吃配江景，本地人日常觅食地' },
                { name: '石灰市菜市场', desc: '解放碑原生农贸市场，豆花饭、蹄花、卤味，无商业包装的纯正市井老味道' },
              ],
              story: '重庆的江湖不在武侠小说里，在一口翻滚的红油火锅中。八一路好吃街的酸辣粉冒着白气，山城巷的石阶旁藏着开了几十年的豌杂面老店，弹子石老街的江风里飘着老火锅的牛油香，石灰市菜市场的豆花饭摊前坐满了刚下班的本地人。重庆人把对生活的热爱煮进了每一锅汤底里。',
            },
            { name: '江山孤傲：大禹与巴渝长河志', subtitle: '涂山留千古传说，两江承载治水山河志',
              pois: [
                { name: '涂山寺', desc: '重庆现存最早千年古刹，禹王祠纪念大禹治水，摩崖石刻留存上古治水传说' },
                { name: '湖广会馆·禹王宫', desc: '清代移民古建筑群核心，供奉大禹，融合南北雕刻工艺，木雕戏台精美绝伦' },
                { name: '呼归石观景处', desc: '对应涂山氏望夫化石传说，纪念平台直面两江交汇，解读大禹治水上古典故' },
                { name: '黄葛古道', desc: '八百年青石板梯道，古时川黔商贸要道，旧时挑夫往返南山必经的治水文化之路' },
              ],
              story: '四千年前，大禹在涂山娶妻，三过家门而不入，将治水的足迹刻进了巴渝大地的山河肌理。涂山寺的禹王祠里香火千年不绝，湖广会馆的禹王宫中移民后代世代供奉，呼归石的传说仍在南滨路的江风中流传。踏上黄葛古道，每一步都踩在巴渝先民与大禹共同书写的治水史诗之上。',
            },
            { name: '潮玩江岸：二次元的破壁幻境', subtitle: '江岸打破次元边界，奔赴独属于少年的浪漫',
              pois: [
                { name: '长嘉汇购物公园', desc: '弹子石滨江潮流商圈，江景露台coser聚集，动漫展同人市集常态化举办' },
                { name: 'S95超次元中心', desc: '南岸大型ACGN场馆，手办潮玩、动漫展览、cosplay场地、剧本杀全涵盖' },
                { name: '海棠溪轻轨站', desc: '环线网红车站，弧形复古廊桥临江，落日时分列车江水桥梁同框如动漫场景' },
                { name: '方圆LIVE', desc: '观音桥地下次元街区，手办动漫周边小众潮店，每周末同人市集，江北次元聚集地' },
              ],
              story: '重庆的江岸线上，二次元的结界正在被打破。长嘉汇的江景露台上coser们迎着江风摆拍，S95超次元中心的手办墙前少年们流连忘返，海棠溪轻轨站的弧形廊桥在落日时分变成动漫场景，方圆LIVE的地下街区每周末都有同人市集。这不是东京秋叶原，这是重庆。',
            },
            { name: '雾锁双江：消失的九开十三门', subtitle: '古城城门隐于岁月，触摸尘封百年的城墙记忆',
              pois: [
                { name: '通远门城墙遗址公园', desc: '重庆唯一完整明代古城门，城西陆路通关门户，瓮城城墙完整保留' },
                { name: '东水门古城门遗址', desc: '明代临江老城门遗存，旧时长江水运通关要道，残存石砌城门基座与城墙' },
                { name: '白象街人和门遗址', desc: '明代小型闭门残段，隐匿于白象街民居之间，原生石砌城墙诉说码头城门往事' },
                { name: '太平门瓮城遗址', desc: '长江沿岸明代瓮城基址，古时商贸水运枢纽，考古保留完整瓮城墙体遗迹' },
              ],

            },
            { name: '轻轨狂热：折叠都市的重力弦切线', subtitle: '轻轨穿梭层叠山城，沿着轨道丈量立体都市',
              pois: [

              story: '重庆的轻轨不是交通工具，是一种城市信仰。佛图关的崖线步道上轻轨从你眼前呼啸而过，北滨路的观景平台上轨道与大桥江水同框，李子坝的穿楼奇观让全世界惊叹，黄花园的江风里轻轨跨江被定格成无数张明信片。沿着轨道走，丈量的是这座折叠都市的骨骼。',

        let currentTheme = null;

        function openDetail(index) {
            currentTheme = themes[index];
            document.getElementById('detail-theme-name').textContent = currentTheme.name;
            document.getElementById('detail-theme-subtitle').textContent = currentTheme.subtitle;
            document.getElementById('detail-story').textContent = currentTheme.story;

            const bgImg = currentTheme.name + '.jpg';
            document.getElementById('detail-panel').style.backgroundImage = 'url(static/images/' + encodeURIComponent(bgImg) + ')';
            document.getElementById('detail-panel').style.backgroundSize = 'cover';
            document.getElementById('detail-panel').style.backgroundPosition = 'center';

            const poisList = document.getElementById('detail-pois-list');
            poisList.innerHTML = currentTheme.pois.map(p => `
                <div class="detail-poi-item">
                    <div class="detail-poi-dot"></div>
                    <div>
                        <div style="font-weight:700;margin-bottom:2px;">${p.name}</div>
                        <div style="font-size:11px;color:#8B6A50;">${p.desc}</div>
                    </div>
                </div>
            `).join('');

            const meta = document.getElementById('detail-meta');
            meta.innerHTML = `
                <div class="detail-meta-item">游览景点 <span>${currentTheme.pois.length}个</span></div>
                <div class="detail-meta-item">预计时长 <span>约${currentTheme.pois.length}-${currentTheme.pois.length+1}小时</span></div>
                <div class="detail-meta-item">出行方式 <span>步行+轻轨为主</span></div>
            `;

            document.getElementById('detail-overlay').classList.add('show');
        }

        function closeDetail() {
            document.getElementById('detail-overlay').classList.remove('show');
            currentTheme = null;
        }

        function startNavigate() {
            if (currentTheme) {
                window.location.href = 'navigate.html?mode=story&theme=' + encodeURIComponent(currentTheme.name) + '&from=story';
            }
        }

        document.getElementById('detail-overlay').addEventListener('click', function(e) {
            if (e.target === this) closeDetail();
        });

        const icons = [
            `<ellipse cx="30" cy="52" rx="28" ry="6" fill="#3D0C08" opacity="0.06"/><path d="M 14 48 L 14 20 Q 14 10 30 10 Q 46 10 46 20 L 46 48" fill="none" stroke="#4A1010" stroke-width="2.5" opacity="0.7"/>`,
            `<ellipse cx="30" cy="52" rx="26" ry="5" fill="#3D0C08" opacity="0.06"/><rect x="18" y="16" width="24" height="20" rx="3" fill="none" stroke="#4A1010" stroke-width="2" opacity="0.65"/><circle cx="24" cy="24" r="4" fill="none" stroke="#4A1010" stroke-width="1.2" opacity="0.5"/><circle cx="36" cy="24" r="4" fill="none" stroke="#4A1010" stroke-width="1.2" opacity="0.5"/>`,

            `<ellipse cx="30" cy="36" rx="18" ry="12" fill="none" stroke="#4A1010" stroke-width="2.5" opacity="0.65"/><line x1="22" y1="26" x2="22" y2="44" stroke="#6B3020" stroke-width="0.8" opacity="0.3"/><line x1="38" y1="26" x2="38" y2="44" stroke="#6B3020" stroke-width="0.8" opacity="0.3"/>`,
            `<path d="M 6 46 Q 18 24 30 18 Q 42 12 54 46" fill="none" stroke="#4A1010" stroke-width="2.5" opacity="0.6"/><path d="M 12 46 Q 22 30 30 24" fill="none" stroke="#6B3020" stroke-width="1" opacity="0.25"/>`,
            `<rect x="12" y="10" width="36" height="32" fill="none" stroke="#4A1010" stroke-width="1.5" opacity="0.5" stroke-dasharray="6 4"/><path d="M 34 16 L 44 18 L 40 26 L 48 32" fill="none" stroke="#4A1010" stroke-width="2" opacity="0.55"/>`,
            `<ellipse cx="30" cy="34" rx="18" ry="12" fill="#C0C8D0" opacity="0.08"/><path d="M 10 48 L 10 28 L 20 20 L 40 20 L 50 28 L 50 48" fill="none" stroke="#4A1010" stroke-width="2.5" opacity="0.65"/>`,
            `<rect x="20" y="20" width="28" height="28" fill="none" stroke="#4A1010" stroke-width="2" opacity="0.6"/><line x1="10" y1="22" x2="24" y2="22" stroke="#4A1010" stroke-width="1.5" opacity="0.5"/><line x1="36" y1="22" x2="50" y2="22" stroke="#4A1010" stroke-width="1.5" opacity="0.5"/>`,
            `<path d="M 0 42 Q 16 22 30 26 Q 44 18 60 38" fill="none" stroke="#4A1010" stroke-width="2.5" opacity="0.55"/><circle cx="18" cy="24" r="2" fill="#4A1010" opacity="0.5"/><circle cx="30" cy="20" r="2.5" fill="#4A1010" opacity="0.55"/><circle cx="42" cy="20" r="2" fill="#4A1010" opacity="0.5"/>`,
            `<line x1="18" y1="14" x2="18" y2="48" stroke="#4A1010" stroke-width="2.5" opacity="0.6"/><line x1="42" y1="14" x2="42" y2="48" stroke="#4A1010" stroke-width="2.5" opacity="0.6"/><line x1="18" y1="22" x2="42" y2="22" stroke="#4A1010" stroke-width="1.2" opacity="0.45"/><line x1="18" y1="30" x2="42" y2="30" stroke="#4A1010" stroke-width="1.2" opacity="0.45"/><line x1="18" y1="38" x2="42" y2="38" stroke="#4A1010" stroke-width="1.2" opacity="0.45"/>`,
        ];

        const grid = document.getElementById('cards-grid');
        themes.forEach((theme, i) => {
            const btn = document.createElement('div');
            btn.className = 'story-btn';
            btn.onclick = function() {
                openDetail(i);
            };
            btn.innerHTML = `
                <div class="btn-icon">
                    <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">${icons[i]}</svg>
                </div>
                <div class="btn-info">
                    <div class="btn-title">${theme.name}</div>
                    <div class="btn-pois">${theme.pois.map(p => '<span>'+p.name+'</span>').join('')}</div>
                </div>
                <div class="btn-arrow">→</div>
                <div class="stamp">山城</div>
            `;
            grid.appendChild(btn);
        });
    </script>
