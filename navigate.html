<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能导航 - 山城故事集</title>
    <style>
        :root {
            --bg-paper: #F7F3EC;
            --gold-warm: #C8A96E;
            --gold-deep: #A0845C;
            --seal-red: #8B3A3A;
            --seal-red-deep: #6B2020;
            --ink: #2C2416;
            --ink-light: #4A3F2F;
            --text-sub: #8B7D6B;
            --card-bg: #F2EDE5;
            --compass-blue: #4A6A78;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Serif SC', 'STSong', 'Songti SC', serif;
            background: var(--bg-paper);
            width: 100vw; height: 100vh; overflow: hidden;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        #paper-texture {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999;
            pointer-events: none; mix-blend-mode: multiply; opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg width='400' height='400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/%3E%3C/svg%3E");
            background-repeat: repeat;
        }
        #app-container { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; }
        #top-bar {
            position: relative; z-index: 10; padding: 16px 20px; display: flex;
            align-items: center; justify-content: space-between; flex-shrink: 0;
            background: linear-gradient(180deg, rgba(247,243,236,0.95) 0%, rgba(247,243,236,0) 100%);
        }
        #back-link {
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            font-size: 13px; color: var(--text-sub); text-decoration: none; cursor: pointer;
            display: flex; align-items: center; gap: 6px; font-weight: 300;
            letter-spacing: 0.03em; transition: color 0.3s;
        }
        #back-link:hover { color: var(--ink-light); }
        #route-title { font-family: 'Noto Serif SC', 'STSong', serif; font-weight: 600; font-size: 18px; color: var(--ink); letter-spacing: 0.04em; }
        #route-summary { font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; font-size: 12px; color: var(--text-sub); font-weight: 300; }
        #map-container { flex: 1; position: relative; z-index: 5; min-height: 0; }
        #amap { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        #route-panel {
            position: relative; z-index: 10; flex-shrink: 0; max-height: 45vh;
            overflow-y: auto; padding: 0 16px 20px; -webkit-overflow-scrolling: touch;
            background: linear-gradient(180deg, rgba(247,243,236,0.6) 0%, rgba(247,243,236,0.95) 30px, var(--bg-paper) 100%);
        }
        #route-panel::-webkit-scrollbar { width: 3px; }
        #route-panel::-webkit-scrollbar-thumb { background: rgba(160,132,92,0.3); border-radius: 2px; }
        #route-panel-header { text-align: center; padding: 8px 0 16px; font-family: 'Noto Serif SC', 'STSong', serif; font-size: 16px; font-weight: 600; color: var(--ink); letter-spacing: 0.04em; }
        .segment-card { display: flex; align-items: center; gap: 14px; padding: 14px 16px; margin-bottom: 8px; background: var(--card-bg); border-radius: 10px; border: 1px solid rgba(200,169,110,0.15); transition: all 0.3s ease; cursor: pointer; }
        .segment-card:hover { border-color: rgba(200,169,110,0.4); box-shadow: 0 2px 12px rgba(44,36,22,0.06); }
        .segment-index { flex-shrink: 0; width: 34px; height: 34px; border-radius: 50%; background: rgba(200,169,110,0.15); display: flex; align-items: center; justify-content: center; font-family: 'Noto Serif SC', serif; font-size: 14px; font-weight: 600; color: var(--gold-deep); }
        .segment-info { flex: 1; min-width: 0; }
        .segment-route { font-family: 'Noto Serif SC', 'STSong', serif; font-weight: 500; font-size: 14px; color: var(--ink); margin-bottom: 4px; letter-spacing: 0.03em; }
        .segment-mode { font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; font-size: 12px; font-weight: 400; padding: 3px 10px; border-radius: 12px; display: inline-block; letter-spacing: 0.03em; }
        .mode-walking { background: rgba(74,122,92,0.12); color: #4A7A5C; }
        .mode-transit { background: rgba(61,107,139,0.12); color: #3D6B8B; }
        .mode-driving { background: rgba(196,78,61,0.12); color: #C44E3D; }
        .segment-stats { font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; font-size: 11px; color: var(--text-sub); font-weight: 300; margin-top: 2px; }
        .segment-arrow { flex-shrink: 0; color: var(--gold-warm); font-size: 18px; }
        .segment-nav-btn {
            flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%;
            background: #8B3A3A; color: #F5EDE0; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; transition: all 0.3s ease;
            z-index: 5;
        }
        .segment-nav-btn:hover { background: #6B2020; }
        #overview-bar { display: flex; gap: 16px; justify-content: center; padding: 10px 0 16px; flex-wrap: wrap; }
        .overview-item { text-align: center; padding: 10px 18px; background: rgba(200,169,110,0.06); border-radius: 8px; }
        .overview-value { font-family: 'Noto Serif SC', 'STSong', serif; font-weight: 600; font-size: 20px; color: var(--seal-red); }
        .overview-label { font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; font-size: 11px; color: var(--text-sub); margin-top: 2px; font-weight: 300; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 500; background: rgba(247,243,236,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 1; transition: opacity 0.5s ease; pointer-events: all; }
        #loading-overlay.hidden { opacity: 0; pointer-events: none; }
        #loading-spinner { width: 48px; height: 48px; border: 3px solid rgba(200,169,110,0.2); border-top-color: var(--gold-warm); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading-text { font-family: 'Noto Serif SC', 'STSong', serif; font-size: 15px; color: var(--ink-light); letter-spacing: 0.04em; }
        #loading-sub { font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; font-size: 12px; color: var(--text-sub); margin-top: 8px; font-weight: 300; }
        @media (max-width: 768px) { #route-panel { max-height: 40vh; } #route-title { font-size: 15px; } .segment-card { padding: 12px 14px; } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div id="loading-spinner"></div>

    <div id="app-container">

        <div id="map-container"><div id="amap"></div></div>

        </div>
    </div>
    <script src="https://webapi.amap.com/maps?v=2.0&key=904d1c838313bd01aaaac52cedbd9e15&plugin=AMap.Walking,AMap.Driving,AMap.Transfer,AMap.Geocoder"></script>

        const AMAP_KEY = '904d1c838313bd01aaaac52cedbd9e15';
        let map = null, userLocation = null;
        let allPolylines = [], allMarkers = [];
        const POI_DATABASE = new Map();
        const allPOIs = [
            { id: 1, name: '洪崖洞民俗风貌区', district: '渝中区', desc: '国家4A级景区，嘉陵江畔依山而建的11层巴渝吊脚楼集群，高低层均连通马路，夜间灯火极具梦幻感，是重庆标志性夜景文旅地标。' },
            { id: 2, name: '解放碑步行街', district: '渝中区', desc: '重庆城市核心商圈，中心矗立中国唯一抗战胜利纪功碑，周边汇聚高端商场、老字号小吃，八一路好吃街集中山城本土小吃。' },
            { id: 3, name: '长江索道景区', district: '渝中区', desc: '国内首条跨长江客运索道，全长1166米，被誉为"空中公交"，轿厢内可俯瞰两江四岸立体城市全景，多部影视剧取景地。' },
            { id: 4, name: '来福士水晶连廊', district: '渝中区', desc: '朝天门"朝天扬帆"地标高空观景设施，坐落塔楼52层，300米悬空玻璃廊道直面长江、嘉陵江交汇水域。' },
            { id: 5, name: '李子坝轻轨观景台', district: '渝中区', desc: '轨道交通2号线专属观景区，轻轨横穿居民楼，全国独有的立体交通奇观，分上下两层观景平台。' },

            { id: 7, name: '魁星楼悬空天桥', district: '渝中区', desc: '临江门山地仿古楼阁配套高空连廊，垂直高差65米，新旧建筑高低错落形成强烈8D山城视觉反差，影视热门取景地。' },
            { id: 8, name: '白象居', district: '渝中区', desc: '24层无电梯老式居民建筑群，空中连廊串联多栋单元楼，完整保留原生老重庆市井生活场景，《少年的你》取景地。' },
            { id: 9, name: '十八梯传统风貌区', district: '渝中区', desc: '连接上半城、下半城的千年石梯街区，复原老重庆阶梯街巷肌理，旧时山城棒棒主要通行道路。' },
            { id: 10, name: '山城巷历史文化步道', district: '渝中区', desc: '沿山脊延伸的原生梯坎步道，千级青石板阶梯串联民国民居、老茶馆、文创小店，完整留存依山而建的老城街巷风貌。' },
            { id: 11, name: '戴家巷悬崖步道', district: '渝中区', desc: '嘉陵江崖壁慢行步道，直面洪崖洞侧景，避开主景区人流，崖边设置多处观景平台，兼具小众打卡与江景休闲功能。' },
            { id: 12, name: '重庆中国三峡博物馆', district: '渝中区', desc: '国家级综合性博物馆，毗邻人民大礼堂，馆藏大量三峡文物、巴蜀青铜器、抗战史料，系统展示巴渝千年历史文明。' },

            { id: 14, name: '湖广会馆', district: '渝中区', desc: '清代移民古建筑群，核心禹王宫供奉大禹治水塑像，融合湖广、江南民居雕刻工艺，配套古戏台，市级重点文保单位。' },

            { id: 16, name: '大轰炸六五隧道遗址', district: '渝中区', desc: '1941年日军轰炸遇难事件原址防空隧道，留存原始掩体结构，陈列遇难史料、文物，是日军无差别轰炸山城的实物见证。' },

            { id: 21, name: '鹅岭二厂文创公园', district: '渝中区', desc: '前身民国中央银行印钞厂，地处渝中半岛制高点，旧厂房改造文艺园区，天台可俯瞰两江交汇，《从你的全世界路过》取景地。' },
            { id: 22, name: '鹅岭公园瞰胜楼', district: '渝中区', desc: '渝中区老牌城市山林公园，山顶瞰胜楼360°俯瞰全城，植被茂密清幽，民国时期私家园林改造而成，免费城市观景绿地。' },
            { id: 23, name: '国泰艺术中心', district: '渝中区', desc: '现代地标文艺场馆，红黑交织几何建筑极具辨识度，配套美术馆、剧场，常年举办美术展览、话剧演出，解放碑文艺打卡地。' },

            { id: 26, name: '新华日报旧址', district: '渝中区', desc: '抗战时期中共机关报办公旧址，完整复原编辑部、印刷间，陈列报刊原稿、历史照片，记录战时红色新闻宣传历程。' },

            { id: 28, name: '黄花园滨江步道', district: '渝中区', desc: '嘉陵江南岸慢行江岸绿地，紧邻黄花园大桥与轨道交通线路，近距离观赏轻轨跨江场景，静谧小众轨道风光步道。' },
            { id: 29, name: '新都巷揽胜亭', district: '渝中区', desc: '半山小众观景平台，无遮挡平视嘉陵江、跨江大桥与轨道列车，人少视野开阔，拍摄立体山城长焦机位。' },
            { id: 30, name: '小什字观景平台', district: '渝中区', desc: '长江索道楼下城市观景台，同步拍摄索道轿厢、白象居建筑群、两江高楼，地处交通枢纽出行便捷。' },

            { id: 34, name: '山城巷防空洞', district: '渝中区', desc: '改造活化民国防空洞，融合文创、茶饮、民俗展示，依托山城步道打造防空文化沉浸式打卡空间。' },

                            POI_DATABASE.set(poi.id, result); geocoded.push(result); continue;
                        }
                    }
                } catch (e) { console.warn('地理编码失败:', poi.name, e); }
                const fallback = { id: poi.id, name: poi.name, district: poi.district, desc: poi.desc, lng: 106.55 + Math.random() * 0.05, lat: 29.54 + Math.random() * 0.04 };
                POI_DATABASE.set(poi.id, fallback); geocoded.push(fallback);
            }
            return geocoded;
        }
        function haversineDistance(lng1, lat1, lng2, lat2) {
            const R = 6371, dLat = (lat2 - lat1) * Math.PI / 180, dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }
        function optimizeRouteOrder(origin, waypoints) {
            const remaining = [...waypoints], ordered = [];
            let current = origin;
            while (remaining.length > 0) {
                let idx = 0, minDist = Infinity;
                remaining.forEach((p, i) => { const d = haversineDistance(current.lng, current.lat, p.lng, p.lat); if (d < minDist) { minDist = d; idx = i; } });
                ordered.push(remaining.splice(idx, 1)[0]);
                current = { lng: ordered[ordered.length - 1].lng, lat: ordered[ordered.length - 1].lat };
            }
            return ordered;
        }
        function parsePolyline(polylineStr) {
            if (!polylineStr) return [];
            const points = [], arr = polylineStr.split(';');
            for (let i = 0; i < arr.length; i++) { const pair = arr[i].split(','); if (pair.length === 2) { const lng = parseFloat(pair[0]), lat = parseFloat(pair[1]); if (!isNaN(lng) && !isNaN(lat)) points.push([lng, lat]); } }
            return points;
        }
        async function fetchDrivingRoute(origin, destination) {
            const url = `https://restapi.amap.com/v3/direction/driving?key=${AMAP_KEY}&origin=${origin.lng},${origin.lat}&destination=${destination.lng},${destination.lat}&strategy=0&extensions=all`;
            try {
                const resp = await fetch(url); const data = await resp.json();
                if (data.status === '1' && data.route && data.route.paths && data.route.paths.length > 0) {
                    const path = data.route.paths[0]; let polyline = [];
                    if (path.polyline) { if (typeof path.polyline === 'string') { polyline = parsePolyline(path.polyline); } else if (Array.isArray(path.polyline)) { polyline = path.polyline; } }
                    if (polyline.length === 0 && path.steps) { path.steps.forEach(step => { if (step.tmcs && step.tmcs.length > 0) { step.tmcs.forEach(tmc => { polyline = polyline.concat(parsePolyline(tmc.polyline || '')); }); } }); }
                    if (polyline.length === 0) { polyline = [[origin.lng, origin.lat], [destination.lng, destination.lat]]; }
                    return { distance: parseInt(path.distance) / 1000, duration: Math.round(parseInt(path.duration) / 60), polyline: polyline, mode: 'driving' };
                }
            } catch (e) { console.warn('驾车路线失败:', e); }
            return null;
        }
        async function fetchWalkingRoute(origin, destination) {
            const url = `https://restapi.amap.com/v3/direction/walking?key=${AMAP_KEY}&origin=${origin.lng},${origin.lat}&destination=${destination.lng},${destination.lat}&extensions=all`;
            try {
                const resp = await fetch(url); const data = await resp.json();
                if (data.status === '1' && data.route && data.route.paths && data.route.paths.length > 0) {
                    const path = data.route.paths[0]; let polyline = [[origin.lng, origin.lat]];
                    if (path.steps && path.steps.length > 0) { path.steps.forEach(step => { const sp = parsePolyline(step.polyline || ''); sp.forEach(p => { const last = polyline[polyline.length - 1]; if (p[0] !== last[0] || p[1] !== last[1]) polyline.push(p); }); }); }
                    if (polyline.length < 2) polyline = [[origin.lng, origin.lat], [destination.lng, destination.lat]];
                    return { distance: parseInt(path.distance) / 1000, duration: Math.round(parseInt(path.duration) / 60), polyline: polyline, mode: 'walking' };
                }
            } catch (e) { console.warn('步行路线失败:', e); }
            return null;
        }
        async function fetchTransitRoute(origin, destination) {
            const url = `https://restapi.amap.com/v3/direction/transit/integrated?key=${AMAP_KEY}&origin=${origin.lng},${origin.lat}&destination=${destination.lng},${destination.lat}&city=重庆&strategy=0&extensions=all`;
            try {
                const resp = await fetch(url); const data = await resp.json();
                if (data.status === '1' && data.route && data.route.transits && data.route.transits.length > 0) {
                    const transit = data.route.transits[0], segments = transit.segments || [];
                    let detailParts = [], allPolyline = [[origin.lng, origin.lat]];
                    segments.forEach(seg => {
                        if (seg.bus && seg.bus.buslines && seg.bus.buslines.length > 0) {
                            const busline = seg.bus.buslines[0], type = busline.type || '公交';
                            const typeLabel = type.includes('地铁') || type.includes('轨道') ? '地铁' : type.includes('轻轨') ? '轻轨' : '公交';
                            detailParts.push(typeLabel + (busline.name || ''));
                            if (busline.polyline) { const bp = parsePolyline(busline.polyline); bp.forEach(p => { const last = allPolyline[allPolyline.length - 1]; if (p[0] !== last[0] || p[1] !== last[1]) allPolyline.push(p); }); }
                        } else if (seg.walking) {
                            detailParts.push('步行' + seg.walking.distance + '米');
                            if (seg.walking.steps) { seg.walking.steps.forEach(step => { const sp = parsePolyline(step.polyline || ''); sp.forEach(p => { const last = allPolyline[allPolyline.length - 1]; if (p[0] !== last[0] || p[1] !== last[1]) allPolyline.push(p); }); }); }
                        }
                    });
                    if (allPolyline.length < 2) allPolyline = [[origin.lng, origin.lat], [destination.lng, destination.lat]];
                    return { distance: parseInt(transit.distance) / 1000, duration: Math.round(parseInt(transit.duration) / 60), polyline: allPolyline, mode: 'transit', detail: detailParts.join(' → ') };
                }
            } catch (e) { console.warn('公交路线失败:', e); }
            return null;
        }
        async function planAllSegments(origin, orderedPOIs) {
            const segments = []; let prev = origin;
            const modeLabels = { driving: '驾车', walking: '步行', transit: '地铁/轻轨' }, modeClasses = { driving: 'mode-driving', walking: 'mode-walking', transit: 'mode-transit' };
            for (let i = 0; i < orderedPOIs.length; i++) {
                const poi = orderedPOIs[i], straightDist = haversineDistance(prev.lng, prev.lat, poi.lng, poi.lat); let result = null;
                document.getElementById('loading-sub').textContent = `正在规划第 ${i+1}/${orderedPOIs.length} 段路线...`;
                if (straightDist < 1.0) { result = await fetchWalkingRoute(prev, poi); if (!result) result = await fetchDrivingRoute(prev, poi); }
                else if (straightDist >= 1.0 && straightDist < 15) { result = await fetchTransitRoute(prev, poi); if (!result) result = await fetchDrivingRoute(prev, poi); }
                else { result = await fetchDrivingRoute(prev, poi); if (!result) result = await fetchTransitRoute(prev, poi); }
                let instruction;
                if (result && result.mode === 'transit' && result.detail) { instruction = `地铁/轻轨约${result.duration}分钟 · ${result.distance.toFixed(1)}km · ${result.detail}`; }
                else if (result) { instruction = `${modeLabels[result.mode]}约${result.duration}分钟 · ${result.distance.toFixed(1)}km`; }
                else { instruction = `驾车约${Math.round(straightDist / 30 * 60)}分钟 · ${straightDist.toFixed(1)}km`; }
                segments.push({ index: i + 1, from: prev.name, to: poi.name, toLng: poi.lng, toLat: poi.lat, distance: result ? result.distance : straightDist, duration: result ? result.duration : Math.round(straightDist / 30 * 60), mode: result ? result.mode : 'driving', modeLabel: result ? modeLabels[result.mode] : '驾车', modeClass: result ? modeClasses[result.mode] : 'mode-driving', instruction: instruction, polyline: (result && result.polyline && result.polyline.length >= 2) ? result.polyline : [[prev.lng, prev.lat], [poi.lng, poi.lat]] });
                prev = { lng: poi.lng, lat: poi.lat, name: poi.name };
            }
            return segments;
        }
        function initMap(origin, orderedPOIs, segments) {
            orderedPOIs = orderedPOIs.filter(p => p && !isNaN(p.lng) && !isNaN(p.lat) && p.lng > 100 && p.lng < 110 && p.lat > 28 && p.lat < 32);
            if (orderedPOIs.length === 0) { document.getElementById('loading-text').textContent = '景点坐标获取失败'; document.getElementById('loading-sub').textContent = '请返回重新选择'; return; }
            if (isNaN(origin.lng) || isNaN(origin.lat)) { origin = { lng: 106.575, lat: 29.558, name: '解放碑（默认位置）' }; }
            map = new AMap.Map('amap', { zoom: 13, center: [origin.lng, origin.lat], mapStyle: 'amap://styles/whitesmoke', viewMode: '3D', pitch: 40 });
            map.setBounds(new AMap.Bounds([106.3, 29.3], [106.7, 29.9]));
            map.setZooms([10, 18]);
            map.setLimitBounds(new AMap.Bounds([106.1, 29.1], [107.0, 30.0]));
            const userMarker = new AMap.Marker({ position: [origin.lng, origin.lat], title: origin.name, icon: new AMap.Icon({ size: new AMap.Size(28, 28), image: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28"><circle cx="14" cy="14" r="12" fill="#4A6A78" stroke="#fff" stroke-width="3"/><circle cx="14" cy="14" r="4" fill="#fff"/></svg>'), imageSize: new AMap.Size(28, 28) }), anchor: 'center', zIndex: 100 });
            map.add(userMarker);
            allPolylines = []; allMarkers = [userMarker];
            const colors = ['#C8A96E', '#A0845C', '#D4C5A0', '#8B6B3E', '#B8956A'];
            let allPoints = [[origin.lng, origin.lat]];
            orderedPOIs.forEach((poi, i) => {
                const marker = new AMap.Marker({ position: [poi.lng, poi.lat], title: poi.name, label: { content: `<div style="background:#8B3A3A;color:#F7F3EC;padding:3px 8px;border-radius:10px;font-size:11px;font-family:'Noto Serif SC',serif;">${i+1}.${poi.name}</div>`, direction: 'top', offset: new AMap.Pixel(0, -10) }, icon: new AMap.Icon({ size: new AMap.Size(22, 22), image: 'data:image/svg+xml,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"><circle cx="11" cy="11" r="10" fill="#8B3A3A" stroke="#F7F3EC" stroke-width="2"/><text x="11" y="15" text-anchor="middle" fill="#F7F3EC" font-size="10" font-weight="bold">${i+1}</text></svg>`), imageSize: new AMap.Size(22, 22) }), anchor: 'center', zIndex: 99 - i });
                map.add(marker); allMarkers.push(marker);
                marker.on('click', function() {
                    const desc = poi.desc || '暂无简介';
                    const navUrl = userLocation ? `https://uri.amap.com/navigation?from=${userLocation.lng},${userLocation.lat},我的位置&to=${poi.lng},${poi.lat},${encodeURIComponent(poi.name)}&mode=car&callnative=1` : `https://uri.amap.com/navigation?to=${poi.lng},${poi.lat},${encodeURIComponent(poi.name)}&mode=car&callnative=1`;
                    const infoContent = `<div style="width:260px;padding:0;font-family:'Noto Serif SC','STSong',serif;overflow:hidden;border-radius:8px;"><div style="width:100%;height:200px;overflow:hidden;background:#EDE0D0;"><img src="/static/images/${encodeURIComponent(poi.name + '.jpg')}" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"><div style="display:none;width:100%;height:100%;align-items:center;justify-content:center;background:#EDE0D0;color:#A09080;font-size:12px;">📷 ${poi.name}</div></div><div style="padding:14px 16px;"><div style="font-size:16px;font-weight:600;color:#2C2416;margin-bottom:4px;">${poi.name}</div><div style="font-size:11px;color:#8B7D6B;margin-bottom:10px;">📍 ${poi.district} · 景点编号 #${poi.id}</div><div style="font-size:12px;color:#4A3F2F;line-height:1.7;margin-bottom:12px;">${desc}</div><div onclick="window.open('${navUrl}','_blank')" style="padding:8px 0;background:#8B3A3A;color:#F7F3EC;border-radius:6px;text-align:center;font-size:13px;cursor:pointer;letter-spacing:0.04em;">🧭 导航到 ${poi.name}</div></div></div>`;
                    const infoWindow = new AMap.InfoWindow({ content: infoContent, offset: new AMap.Pixel(0, -35) });
                    infoWindow.open(map, [poi.lng, poi.lat]);
                });
            });
            segments.forEach((seg, i) => {
                if (seg.polyline && seg.polyline.length >= 2) {
                    const validPath = [];
                    for (let j = 0; j < seg.polyline.length; j++) { const p = seg.polyline[j]; if (p && p.length === 2 && !isNaN(p[0]) && !isNaN(p[1]) && p[0] > 100 && p[0] < 110 && p[1] > 28 && p[1] < 32) { validPath.push(p); } }
                    if (validPath.length >= 2) {
                        allPoints = allPoints.concat(validPath.slice(1));
                        const poly = new AMap.Polyline({ path: validPath, strokeColor: colors[i % colors.length], strokeWeight: 5, strokeOpacity: 0.8, lineJoin: 'round', showDir: true });
                        map.add(poly); allPolylines.push({ poly: poly, segIndex: i, originalColor: colors[i % colors.length] });
                    }
                }
            });
            if (allPoints.length >= 2) { const fullLine = new AMap.Polyline({ path: allPoints, strokeColor: '#C8A96E', strokeWeight: 1.5, strokeOpacity: 0.2, strokeStyle: 'dashed', lineJoin: 'round' }); map.add(fullLine); }
            map.setFitView(null, false, [60, 60, 60, 300]);
        }
        function renderRoutePanel(origin, orderedPOIs, segments) {
            document.getElementById('total-pois').textContent = orderedPOIs.length;
            document.getElementById('total-distance').textContent = segments.reduce((s, x) => s + x.distance, 0).toFixed(1);
            document.getElementById('total-duration').textContent = segments.reduce((s, x) => s + x.duration, 0);
            const listEl = document.getElementById('segments-list');
            listEl.innerHTML = `<div class="segment-card" style="opacity:0.7;"><div class="segment-index" style="background:rgba(74,106,120,0.12);color:#4A6A78;">📍</div><div class="segment-info"><div class="segment-route">${origin.name}</div><div class="segment-stats">起点</div></div></div>`;
            segments.forEach((seg, i) => {
                const card = document.createElement('div'); card.className = 'segment-card'; card.setAttribute('data-seg-index', i);
                card.onclick = () => { highlightSegment(i); map.setZoomAndCenter(14, [seg.toLng, seg.toLat]); };
                card.innerHTML = `
                    <div class="segment-index">${seg.index}</div>
                    <div class="segment-info">
                        <div class="segment-route">${seg.to}</div>
                        <span class="segment-mode ${seg.modeClass}">${seg.modeLabel}</span>
                        <div class="segment-stats">${seg.instruction}</div>
                    </div>
                    <div class="segment-nav-btn" onclick="event.stopPropagation(); openSegmentNav(${seg.toLng}, ${seg.toLat}, '${seg.to.replace(/'/g, "\\'")}');">🧭</div>`;
                listEl.appendChild(card);
            });
        }
        function highlightSegment(index) {
            allPolylines.forEach(item => { if (item.segIndex === index) { item.poly.setOptions({ strokeWeight: 7, strokeOpacity: 1, strokeColor: '#8B3A3A' }); } else { item.poly.setOptions({ strokeWeight: 3, strokeOpacity: 0.25, strokeColor: item.originalColor }); } });
            document.querySelectorAll('.segment-card').forEach((card, i) => { if (i > 0) { const segIdx = parseInt(card.getAttribute('data-seg-index')); card.style.borderColor = segIdx === index ? 'rgba(139,58,58,0.5)' : 'rgba(200,169,110,0.15)'; card.style.background = segIdx === index ? 'rgba(139,58,58,0.04)' : ''; } });
        }
        function openSegmentNav(lng, lat, name) {
            const from = userLocation ? `${userLocation.lng},${userLocation.lat},我的位置` : '';
            const fromParam = from ? `from=${from}&` : '';
            window.open(`https://uri.amap.com/navigation?${fromParam}to=${lng},${lat},${encodeURIComponent(name)}&mode=car&callnative=1`, '_blank');
        }
        async function main() {
            let targetPOIs = getTargetPOIs();
            if (targetPOIs.length === 0) { document.getElementById('loading-text').textContent = '未找到景点数据'; return; }
            document.getElementById('loading-sub').textContent = '正在获取景点坐标...';
            targetPOIs = await geocodePOIs(targetPOIs);
            document.getElementById('loading-sub').textContent = '正在获取您的位置...';
            userLocation = await getUserLocation();
            document.getElementById('loading-sub').textContent = '正在计算最优游览顺序...';
            const orderedPOIs = optimizeRouteOrder(userLocation, targetPOIs);
            const segments = await planAllSegments(userLocation, orderedPOIs);
            document.getElementById('loading-sub').textContent = '正在加载地图...';
            await new Promise(r => setTimeout(r, 300));
            initMap(userLocation, orderedPOIs, segments);
            renderRoutePanel(userLocation, orderedPOIs, segments);
            const { mode, theme } = getURLParams();
            document.getElementById('route-title').textContent = mode === 'story' ? (theme || '') + ' · 游览路线' : '自由探索 · 游览路线';
            setTimeout(() => document.getElementById('loading-overlay').classList.add('hidden'), 500);
        }
        window.onload = () => { const check = setInterval(() => { if (typeof AMap !== 'undefined') { clearInterval(check); main().catch(err => { console.error(err); document.getElementById('loading-text').textContent = '加载失败'; document.getElementById('loading-sub').textContent = err.message; }); } }, 200); };
    </script>
