<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自由探索 - 山城故事集</title>
    <style>
        :root {
            --paper: #F0E8D8;
            --paper-light: #F5EDE0;
            --paper-dark: #E0D4C0;
            --ink: #4A1010;
            --ink-light: #6B3020;
            --gold: #B87030;
            --gold-light: #D4A070;
            --wood: #C0B098;
            --wood-dark: #A89880;
            --seal-red: #8B3A3A;
            --seal-red-deep: #6B2020;
            --card-bg: #F5EDE0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

         body {
            overflow: hidden; height: 100vh;
            font-family: 'Noto Serif SC', 'STSong', 'Songti SC', serif;
            background-image: url('/static/images/背景图2.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            width: 100vw;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        #paper-texture {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            pointer-events: none; mix-blend-mode: multiply; opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg width='400' height='400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/%3E%3C/svg%3E");
            background-repeat: repeat;
        }

               #main-content {
            position: relative; z-index: 2; max-width: 1200px; margin: 0 auto;
            padding: 3vh 40px 3vh; height: 100vh; overflow-y: auto;
            display: flex; flex-direction: column;
        }

        #station-board {
            width: 60vw; max-width: 500px; margin: 0 auto 2vh; flex-shrink: 0;
            background: #E8DDD0; border: 3px solid var(--wood-dark);
            border-radius: 8px; padding: 8px 0; text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12), inset 0 0 20px rgba(0,0,0,0.05);
        }
        #station-board .signal-light {
            display: inline-block; width: 10px; height: 10px; border-radius: 50%;
            background: #D84030; margin: 0 8px; vertical-align: middle;
            box-shadow: 0 0 8px #D84030;
            animation: signalBlink 0.8s ease-in-out infinite;
        }
        .signal-light:nth-child(1) { animation-delay: 0s; }
        .signal-light:nth-child(2) { animation-delay: 0.4s; }
        @keyframes signalBlink { 0%,100%{opacity:1;} 50%{opacity:0.25;} }
        #station-text {
            font-family: 'Noto Serif SC', 'STSong', serif;
            font-size: clamp(16px, 2.2vw, 24px); font-weight: 700;
            color: var(--ink); letter-spacing: 0.2em;
        }

        #filter-bar {
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 2vh; flex-shrink: 0;
        }
        .filter-tag {
            padding: 5px 14px; border-radius: 14px;
            font-family: 'Noto Sans SC', 'PingFang SC', sans-serif; font-size: 12px;
            cursor: pointer; border: 1px solid rgba(160,132,92,0.4);
            background: rgba(245,237,224,0.5); color: #6B5040; transition: all 0.3s ease;
        }
        .filter-tag:hover { border-color: var(--gold); background: rgba(200,169,110,0.15); }
        .filter-tag.active { background: var(--gold); color: #FFF; border-color: var(--gold); font-weight: 500; }

        #selection-bar {
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;
            gap: 10px; margin-bottom: 2vh; padding: 10px 16px; flex-shrink: 0;
            background: rgba(245,237,224,0.5); border-radius: 8px;
            border: 1px dashed rgba(160,132,92,0.3);
        }
        #selection-count {
            font-family: 'LiSu', '隶书', 'STLiti', 'KaiTi', serif;
            font-size: 14px; color: #6B5040;
        }
        #selection-count span { font-weight: 700; color: #8B3A3A; }
        #start-navigate-btn {
            padding: 6px 20px; border-radius: 16px; background: #8B3A3A;
            color: #F5EDE0; border: none; cursor: pointer;
            font-family: 'LiSu', '隶书', 'STLiti', 'KaiTi', serif;
            font-size: 13px; letter-spacing: 0.04em; transition: all 0.3s ease;
            opacity: 0.5; pointer-events: none;
        }
        #start-navigate-btn.ready { opacity: 1; pointer-events: auto; }
        #start-navigate-btn.ready:hover { background: #6B2020; box-shadow: 0 4px 12px rgba(139,58,58,0.3); }

        #poi-scroll {
            flex: 1; overflow: visible; padding: 0 4px;
        }

        #poi-grid {
            display: grid; gap: 10px;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        }
        @media (max-width: 768px) { #poi-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; } }

        .poi-card {
            background: rgba(245,237,224,0.75); border-radius: 6px; padding: 12px 14px;
            cursor: pointer; transition: all 0.3s ease;
            position: relative; overflow: visible; display: flex; align-items: center; gap: 10px;
            border: none;
            box-shadow: 0 2px 6px rgba(80,50,30,0.1);
        }
        .poi-card::before {
            content: ''; position: absolute; left: -8px; top: 50%; transform: translateY(-50%);
            width: 16px; height: 16px; background: #C4B098; border-radius: 50%;
            box-shadow: inset 0 0 0 2px rgba(180,150,120,0.5);
        }
        .poi-card::after {
            content: ''; position: absolute; right: -1px; top: 0; width: 6px; height: 100%;
            background: rgba(245,237,224,0.75); border-radius: 0 3px 3px 0;
            mask-image: repeating-linear-gradient(0deg, transparent 0px, transparent 5px, black 5px, black 7px);
            -webkit-mask-image: repeating-linear-gradient(0deg, transparent 0px, transparent 5px, black 5px, black 7px);
        }
        .poi-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(80,50,30,0.2);
            background: rgba(250,245,235,0.85);
            z-index: 100;
        }
        .poi-card.selected {
            background: rgba(139,58,58,0.06);
            box-shadow: 0 0 0 2px rgba(139,58,58,0.3);
        }
        .poi-card.selected::before {
            background: #8B3A3A;
            box-shadow: inset 0 0 0 2px rgba(139,58,58,0.5), 0 0 6px rgba(216,64,48,0.4);
        }
        .poi-card.selected .poi-check {
            background: #8B3A3A; color: #F5EDE0; border-color: #8B3A3A; font-weight: 700;
        }
        .poi-check {
            flex-shrink: 0; width: 24px; height: 24px; text-align: center; line-height: 24px;
            font-size: 14px; color: #A09080; font-weight: 400;
            position: relative; z-index: 1;
            border-radius: 50%; background: rgba(180,150,120,0.2);
            border: 2px solid #B8A080; cursor: pointer;
        }
        .poi-info { flex: 1; min-width: 0; position: relative; z-index: 1; }
        .poi-name {
            font-family: 'Noto Serif SC', 'STSong', serif; font-weight: 600;
            font-size: 13px; color: var(--ink); margin-bottom: 2px;
        }
        .poi-district {
            font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
            font-size: 10px; color: #A09080; font-weight: 300;
        }

        .poi-card .poi-tooltip {
            display: none; position: absolute; left: calc(100% + 12px); top: 0;
            width: 200px; border-radius: 8px; overflow: hidden;
            box-shadow: 0 6px 24px rgba(0,0,0,0.3); z-index: 200;
            background: #F5EDE0;
        }
        .poi-card:nth-child(even) .poi-tooltip {
            left: auto; right: calc(100% + 12px);
        }
        .poi-card.bottom-row .poi-tooltip {
            top: auto; bottom: 0;
        }
        .poi-card .poi-tooltip img {
            width: 100%; height: 267px; object-fit: cover; display: block;
        }
        .poi-card .poi-tooltip .tooltip-info {
            padding: 10px 14px;
        }
        .poi-card .poi-tooltip .tooltip-name {
            font-family: 'Noto Serif SC', 'STSong', serif;
            font-weight: 700; font-size: 14px; color: #3D1810; margin-bottom: 2px;
        }
        .poi-card .poi-tooltip .tooltip-district {
            font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
            font-size: 10px; color: #A09080; margin-bottom: 6px;
        }
        .poi-card .poi-tooltip .tooltip-desc {
            font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
            font-size: 11px; color: #5C3A28; line-height: 1.5;
        }

        #back-section { text-align: center; padding: 2vh 0 0; flex-shrink: 0; }
        #back-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer;
            font-family: 'LiSu', '隶书', 'STLiti', 'KaiTi', serif;
            font-size: 14px; color: #5C3A28; text-decoration: none; transition: all 0.3s;
            background: #F5EDE0; padding: 10px 28px; position: relative;
            border-radius: 4px; box-shadow: 0 2px 6px rgba(80,50,30,0.15);
            border-bottom: 2px dashed #B8A080;
        }
        #back-btn:hover { color: #3D1810; background: #FBF5EE; box-shadow: 0 4px 12px rgba(80,50,30,0.25); }

        #toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: #3D1810; color: #F5EDE0; padding: 8px 20px;
            border-radius: 16px; font-family: 'LiSu', '隶书', 'KaiTi', serif;
            font-size: 13px; z-index: 1000; opacity: 0;
            transition: all 0.3s ease; pointer-events: none;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }

        @media (max-width: 768px) {
            #main-content { padding: 2vh 16px 2vh; }
        }
    </style>
</head>
<body>

    <div style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;
                background:rgba(196,176,152,0.45);"></div>
    <div id="paper-texture"></div>

    <div id="main-content">
        <div id="station-board">
            <span class="signal-light"></span>
            <span class="signal-light"></span>
            <span id="station-text">勾选你的山城目的地</span>
            <span class="signal-light"></span>
            <span class="signal-light"></span>
        </div>

        <div id="filter-bar">
            <div class="filter-tag active" data-filter="all">全部</div>
            <div class="filter-tag" data-filter="渝中区">渝中区</div>
            <div class="filter-tag" data-filter="南岸区">南岸区</div>
            <div class="filter-tag" data-filter="江北区">江北区</div>
            <div class="filter-tag" data-filter="沙坪坝区">沙坪坝区</div>
            <div class="filter-tag" data-filter="其他区">其他区</div>
            <div style="width:100%;height:0;"></div>
            <div class="filter-tag tag-filter" data-tag="历史">🏛 历史</div>
            <div class="filter-tag tag-filter" data-tag="美食">🍜 美食</div>
            <div class="filter-tag tag-filter" data-tag="观景">🌄 观景</div>
            <div class="filter-tag tag-filter" data-tag="文创">🎨 文创</div>
            <div class="filter-tag tag-filter" data-tag="自然">🌿 自然</div>
        </div>

        <div id="selection-bar">
            <div id="selection-count">已选择 <span>0</span> / 100 个景点</div>
            <button id="start-navigate-btn" onclick="startNavigate()">请至少选择2个景点</button>
        </div>

        <div id="poi-scroll">
            <div id="poi-grid"></div>
        </div>

        <div id="back-section">
            <a id="back-btn" href="/">← 返回首页</a>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const allPOIs = [
            { id: 1, name: '洪崖洞民俗风貌区', district: '渝中区', tags: ['观景','历史'], desc: '国家4A级景区，嘉陵江畔依山而建的11层巴渝吊脚楼集群，高低层均连通马路，夜间灯火极具梦幻感，是重庆标志性夜景文旅地标。' },
            { id: 2, name: '解放碑步行街', district: '渝中区', tags: ['美食','历史'], desc: '重庆城市核心商圈，中心矗立中国唯一抗战胜利纪功碑，周边汇聚高端商场、老字号小吃，八一路好吃街集中山城本土小吃。' },
            { id: 3, name: '长江索道景区', district: '渝中区', tags: ['观景'], desc: '国内首条跨长江客运索道，全长1166米，被誉为"空中公交"，轿厢内可俯瞰两江四岸立体城市全景，多部影视剧取景地。' },
            { id: 4, name: '来福士水晶连廊', district: '渝中区', tags: ['观景','文创'], desc: '朝天门"朝天扬帆"地标高空观景设施，坐落塔楼52层，300米悬空玻璃廊道直面长江、嘉陵江交汇水域。' },
            { id: 5, name: '李子坝轻轨观景台', district: '渝中区', tags: ['观景'], desc: '轨道交通2号线专属观景区，轻轨横穿居民楼，全国独有的立体交通奇观，分上下两层观景平台。' },
            { id: 6, name: '千厮门嘉陵江大桥', district: '渝中区', tags: ['观景'], desc: '跨江公路轨道两用桥梁，人行道为拍摄洪崖洞全景最佳机位，傍晚灯光亮起后桥体、江水、吊脚楼同框。' },
            { id: 7, name: '魁星楼悬空天桥', district: '渝中区', tags: ['观景'], desc: '临江门山地仿古楼阁配套高空连廊，垂直高差65米，新旧建筑高低错落形成强烈8D山城视觉反差，影视热门取景地。' },
            { id: 8, name: '白象居', district: '渝中区', tags: ['历史','观景'], desc: '24层无电梯老式居民建筑群，空中连廊串联多栋单元楼，完整保留原生老重庆市井生活场景，《少年的你》取景地。' },
            { id: 9, name: '十八梯传统风貌区', district: '渝中区', tags: ['历史','美食'], desc: '连接上半城、下半城的千年石梯街区，复原老重庆阶梯街巷肌理，旧时山城棒棒主要通行道路。' },
            { id: 10, name: '山城巷历史文化步道', district: '渝中区', tags: ['历史','自然'], desc: '沿山脊延伸的原生梯坎步道，千级青石板阶梯串联民国民居、老茶馆、文创小店，完整留存依山而建的老城街巷风貌。' },
            { id: 11, name: '戴家巷悬崖步道', district: '渝中区', tags: ['自然','观景'], desc: '嘉陵江崖壁慢行步道，直面洪崖洞侧景，避开主景区人流，崖边设置多处观景平台，兼具小众打卡与江景休闲功能。' },
            { id: 12, name: '重庆中国三峡博物馆', district: '渝中区', tags: ['历史','文创'], desc: '国家级综合性博物馆，毗邻人民大礼堂，馆藏大量三峡文物、巴蜀青铜器、抗战史料，系统展示巴渝千年历史文明。' },
            { id: 13, name: '重庆人民大礼堂', district: '渝中区', tags: ['历史'], desc: '重庆城市经典地标，仿天坛中式古典建筑形制，琉璃屋顶恢弘大气，前侧广场开阔，是城市文化活动与打卡取景核心区域。' },
            { id: 14, name: '湖广会馆', district: '渝中区', tags: ['历史'], desc: '清代移民古建筑群，核心禹王宫供奉大禹治水塑像，融合湖广、江南民居雕刻工艺，配套古戏台，市级重点文保单位。' },
            { id: 15, name: '曾家岩50号周公馆', district: '渝中区', tags: ['历史'], desc: '抗战时期中共中央南方局城内办公驻地，周恩来、邓颖超长期在此工作生活，全国重点文保单位，记录陪都地下统战历史。' },
            { id: 16, name: '大轰炸六五隧道遗址', district: '渝中区', tags: ['历史'], desc: '1941年日军轰炸遇难事件原址防空隧道，留存原始掩体结构，陈列遇难史料、文物，是日军无差别轰炸山城的实物见证。' },
            { id: 17, name: '通远门城墙遗址公园', district: '渝中区', tags: ['历史'], desc: '重庆现存最完整明代古城门，古时城西陆路通关门户，保留瓮城、古城墙本体，配套图文展馆解读老城"九开十三门"建制。' },
            { id: 18, name: '东水门古城门遗址', district: '渝中区', tags: ['历史'], desc: '明代临江老城门遗存，旧时长江水运通关要道，残存石砌城门基座与古城墙，依托滨江步道打造老城历史展示节点。' },
            { id: 19, name: '白象街人和门遗址', district: '渝中区', tags: ['历史'], desc: '明代小型闭门残段，隐匿于白象街民居之间，留存原生石砌城墙，结合复古老街打造明清码头城门文化打卡点。' },
            { id: 20, name: '太平门瓮城遗址', district: '渝中区', tags: ['历史'], desc: '长江沿岸明代瓮城基址，古时商贸水运枢纽，考古保留完整墙体遗迹，配套历史解说牌还原当年码头市井风貌。' },
            { id: 21, name: '鹅岭二厂文创公园', district: '渝中区', tags: ['文创'], desc: '前身民国中央银行印钞厂，地处渝中半岛制高点，旧厂房改造文艺园区，天台可俯瞰两江交汇，《从你的全世界路过》取景地。' },
            { id: 22, name: '鹅岭公园（瞰胜楼）', district: '渝中区', tags: ['观景','自然'], desc: '渝中区老牌城市山林公园，山顶瞰胜楼360°俯瞰全城，植被茂密清幽，民国时期私家园林改造而成，免费城市观景绿地。' },
            { id: 23, name: '国泰艺术中心', district: '渝中区', tags: ['文创'], desc: '现代地标文艺场馆，红黑交织几何建筑极具辨识度，配套美术馆、剧场，常年举办美术展览、话剧演出，解放碑文艺打卡地。' },
            { id: 24, name: '较场口夜市', district: '渝中区', tags: ['美食'], desc: '渝中区老牌夜间市集，依托老城区街巷分布火锅、烧烤、特色小吃，夜间烟火氛围浓厚，本地人与游客高频觅食街区。' },
            { id: 25, name: '抗建堂', district: '渝中区', tags: ['历史'], desc: '1941年落成民国专业剧场，抗战时期全国话剧核心阵地，郭沫若、曹禺等名家在此排演救国剧目，兼具剧场与戏剧史料展馆功能。' },
            { id: 26, name: '新华日报旧址', district: '渝中区', tags: ['历史'], desc: '抗战时期中共机关报办公旧址，完整复原编辑部、印刷间，陈列报刊原稿、历史照片，记录战时红色新闻宣传历程。' },
            { id: 27, name: '罗汉寺', district: '渝中区', tags: ['历史'], desc: '千年禅宗古刹，闹市中心清净寺院，拥有宋代摩崖石刻罗汉造像，《疯狂的石头》取景地，香火旺盛兼具人文与影视打卡属性。' },
            { id: 28, name: '黄花园滨江步道', district: '渝中区', tags: ['自然','观景'], desc: '嘉陵江南岸慢行江岸绿地，紧邻黄花园大桥与轨道交通线路，近距离观赏轻轨跨江场景，静谧小众轨道风光步道。' },

            { id: 93, name: '交通茶馆', district: '九龙坡区', tags: ['美食','历史'], desc: '川美旁四十余年老式市井茶馆，木桌竹椅、盖碗茶，本地老人闲谈下棋，原汁原味老重庆市井茶空间。' },
            { id: 94, name: '华熙LIVE鱼洞', district: '巴南区', tags: ['文创'], desc: '巴南大型潮流文体商圈，演艺场馆、潮玩商铺、夜市全覆盖，南部主城年轻群体休闲核心地。' },
            { id: 95, name: '重庆动物园', district: '九龙坡区', tags: ['自然'], desc: '国家4A级城市动物园，饲养大熊猫、金丝猴等珍稀动物，轨道交通2号线直达，亲子出游热门景区。' },
            { id: 96, name: '义渡古镇', district: '大渡口区', tags: ['历史','美食'], desc: '长江边复古码头古镇，明清砖木民居保存完整，滨江步道、老戏台，小众安静复古文旅街区。' },
            { id: 97, name: '白居寺大桥观景台', district: '大渡口区', tags: ['观景'], desc: '跨江大桥人行观景通道，宽阔江面视野，拍摄长江、列车、城市建筑全景小众机位。' },
            { id: 98, name: '金刚碑古村落', district: '北碚区', tags: ['历史','自然'], desc: '嘉陵江边百年古村落，藏于峡谷绿植之间，老式砖木民居隐于林木，清幽治愈原生态古村。' },
            { id: 99, name: '缙云山步道', district: '北碚区', tags: ['自然'], desc: '国家级自然保护区登山步道，山间古寺、竹海遍布，"缙岭云霞"巴渝十二景之一，主城天然洗肺山林。' },
            { id: 100, name: '西流沱小镇', district: '巴南区', tags: ['美食','历史'], desc: '滨江仿古文旅小镇，仿明清巴渝建筑群，夜间灯笼氛围感浓厚，配套江景餐饮、休闲市集。' },
        ];

        let selectedPOIs = new Set();
        let currentFilter = 'all';
        let currentTag = '';

        function renderPOIs() {
            const grid = document.getElementById('poi-grid');
            grid.innerHTML = '';
            let filtered = currentFilter === 'all'
                ? allPOIs
                : currentFilter === '其他区'
                    ? allPOIs.filter(p => !['渝中区','南岸区','江北区','沙坪坝区'].includes(p.district))
                    : allPOIs.filter(p => p.district === currentFilter);

            if (currentTag) {
                filtered = filtered.filter(p => p.tags && p.tags.includes(currentTag));
            }

            const cols = Math.floor(grid.offsetWidth / 240) || 5;
            const totalRows = Math.ceil(filtered.length / cols);

            filtered.forEach((poi, idx) => {
                const currentRow = Math.floor(idx / cols);
                const isBottomRow = currentRow >= totalRows - 3;
                const card = document.createElement('div');
                card.className = 'poi-card' + (selectedPOIs.has(poi.id) ? ' selected' : '') + (isBottomRow ? ' bottom-row' : '');
                card.onclick = (e) => {
                    if (e.target.closest('.poi-tooltip')) return;
                    if (e.target.closest('.poi-check')) {
                        selectedPOIs.has(poi.id) ? selectedPOIs.delete(poi.id) : selectedPOIs.add(poi.id);
                        renderPOIs();
                        showToast(selectedPOIs.has(poi.id) ? '已添加' : '已移除');
                        return;
                    }
                    document.querySelectorAll('.poi-tooltip').forEach(t => t.style.display = 'none');
                    card.querySelector('.poi-tooltip').style.display = 'block';
                };
                const imgFile = poi.name + '.jpg';
                const desc = poi.desc || '';
                card.innerHTML = `
                    <div class="poi-tooltip">
                        <div class="tooltip-close" style="position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,0.4);color:#FFF;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;z-index:10;">✕</div>
                        <img src="/static/images/${encodeURIComponent(imgFile)}" onerror="this.style.display='none';" alt="">
                        <div class="tooltip-info">
                            <div class="tooltip-name">${poi.name}</div>
                            <div class="tooltip-district">${poi.district}</div>
                            <div class="tooltip-desc">${desc}</div>
                        </div>
                    </div>
                    <div class="poi-check">${selectedPOIs.has(poi.id) ? '✓' : ''}</div>
                    <div class="poi-info">
                        <div class="poi-name">${poi.name}</div>
                        <div class="poi-district">${poi.district}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
            updateBar();
        }

        function updateBar() {
            const count = selectedPOIs.size;
            document.getElementById('selection-count').innerHTML = '已选择 <span>' + count + '</span> / 100 个景点';
            const btn = document.getElementById('start-navigate-btn');
            if (count >= 2) {
                btn.classList.add('ready');
                btn.textContent = '开始导航 (' + count + '个)';
            } else {
                btn.classList.remove('ready');
                btn.textContent = '请至少选择2个景点';
            }
        }

        document.addEventListener('click', function(e) {
            if (e.target.closest('.tooltip-close')) {
                const tooltip = e.target.closest('.poi-tooltip');
                if (tooltip) tooltip.style.display = 'none';
            }
        });

        document.getElementById('filter-bar').addEventListener('click', e => {
            if (e.target.classList.contains('tag-filter')) {
                document.querySelectorAll('.tag-filter').forEach(t => t.classList.remove('active'));
                if (currentTag === e.target.dataset.tag) {
                    currentTag = '';
                    document.querySelector('[data-filter="all"]').classList.add('active');
                } else {
                    e.target.classList.add('active');
                    currentTag = e.target.dataset.tag;
                    document.querySelectorAll('[data-filter]:not(.tag-filter)').forEach(t => t.classList.remove('active'));
                }
                renderPOIs();
                return;
            }
            if (e.target.classList.contains('filter-tag') && !e.target.classList.contains('tag-filter')) {
                document.querySelectorAll('.filter-tag:not(.tag-filter)').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tag-filter').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.dataset.filter;
                currentTag = '';
                renderPOIs();
            }
        });

        function startNavigate() {
            if (selectedPOIs.size < 2) { showToast('请至少选择2个景点'); return; }
            const ids = Array.from(selectedPOIs).sort((a,b)=>a-b).join(',');
            window.location.href = '/navigate?mode=free&pois=' + ids + '&from=free';
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 1500);
        }

        renderPOIs();
    </script>
</body>
</html>
